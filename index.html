<title>تقرير البرامج المنفّذة</title>

<style>
:root{
  --teal:#15806f; --teal-d:#0f5d50; --teal-l:#1ea088;
  --gold:#b08d57; --gold-d:#8f713f;
  --ink:#26302d; --ink-2:#5d6864; --mut:#8a938f;
  --bg1:#eef1f0; --bg2:#e2e7e5;
  --card:#ffffff; --line:#dde3e1;
  --tint:rgba(21,128,111,.08); --tint-h:rgba(21,128,111,.15);
  --ok:#15806f; --danger:#c0473f;
  --data-font:'Calibri','Segoe UI','Tajawal',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
  --bar-h:64px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Tajawal',sans-serif;color:var(--ink);
  background:
    radial-gradient(1100px 520px at 100% -8%, rgba(21,128,111,.10), transparent 60%),
    radial-gradient(900px 480px at -10% 110%, rgba(176,141,87,.10), transparent 55%),
    linear-gradient(160deg,var(--bg1),var(--bg2));
  background-attachment:fixed;-webkit-font-smoothing:antialiased;
  min-height:100vh;
}
button,input,textarea{font-family:inherit}
button{cursor:pointer}

/* ===== شريط علوي ===== */
.topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top,0px));
  background:rgba(255,255,255,.82);backdrop-filter:saturate(160%) blur(12px);
  border-bottom:1px solid var(--line);box-shadow:0 1px 14px rgba(15,93,80,.06);
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.logo{width:38px;height:38px;border-radius:12px;flex:none;display:grid;place-items:center;color:#fff;font-size:19px;font-weight:900;
  background:linear-gradient(150deg,var(--teal-l),var(--teal-d));box-shadow:0 8px 18px -7px rgba(15,93,80,.85)}
.brand h1{margin:0;font-size:16px;font-weight:900;color:var(--teal-d);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand small{display:block;font-weight:600;font-size:10.5px;color:var(--mut);margin-top:1px}
.top-actions{display:flex;align-items:center;gap:8px;flex:none}
.icon-btn{position:relative;width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:#fff;font-size:19px;color:var(--teal-d);
  display:grid;place-items:center;transition:.15s}
.icon-btn:hover{background:var(--tint);border-color:var(--teal)}
.icon-btn:active{transform:translateY(1px)}
.dot-badge{position:absolute;top:-5px;left:-5px;min-width:19px;height:19px;border-radius:20px;background:var(--gold);color:#fff;
  font-size:11px;font-weight:800;display:grid;place-items:center;padding:0 5px;border:2px solid #fff}

/* ===== المسرح ===== */

/* الحقول */
.fld{
  position:absolute;font-family:var(--data-font);font-weight:600;color:var(--ink);font-size:1.55cqw;
  background:var(--tint);border-radius:5px;outline:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;text-align:center;
  line-height:1.16;overflow:hidden;transition:background .12s,box-shadow .12s;
  padding:0 .55cqw;white-space:pre-wrap;word-break:break-word;-webkit-tap-highlight-color:transparent;
}
.fld:hover{background:var(--tint-h)}
.fld:active{box-shadow:0 0 0 1.8px var(--teal)}
.fld.empty:before{content:attr(data-ph);color:rgba(21,128,111,.5);font-weight:600;font-family:'Tajawal',sans-serif;font-size:.86em}
.fld.right{text-align:right;justify-content:flex-start}
.fld.right.empty{justify-content:flex-start}
.fld.center{text-align:center;justify-content:center}
.fld.date{font-weight:800;color:#2f3a37;letter-spacing:.3px;background:transparent}
.fld.date:hover{background:var(--tint-h)}
.fld.date:not(.empty){background:rgba(255,255,255,.35)}
.date-mask{position:absolute;left:39%;top:39.7%;width:19.5%;height:2.9%;background:#fff;pointer-events:none;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.dseg{unicode-bidi:isolate}
.fld.multi{justify-content:center;gap:3.2cqw;flex-wrap:nowrap}
.impl-name{white-space:nowrap}

/* خانات الصور */
.pslot{position:absolute;border-radius:.7cqw;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#fff;cursor:pointer;
  border:.18cqw solid #a8997e;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pslot img{display:block;background:#fff}
.padd{
  width:100%;height:100%;border:none;background:var(--tint);
  color:var(--teal-d);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3cqw;
  font-weight:800;font-size:1.4cqw;text-align:center;line-height:1.15;transition:.15s
}
.padd:hover{background:var(--tint-h)}
.padd .cam{font-size:3.1cqw;line-height:1}
.padd .sub{font-size:1.05cqw;font-weight:600;color:var(--teal);opacity:.85}
.pedit{position:absolute;bottom:.5cqw;left:.5cqw;width:auto;height:2.6cqw;min-height:20px;padding:0 1cqw;border-radius:20px;border:none;
  background:rgba(15,93,80,.85);color:#fff;font-size:1.15cqw;font-weight:800;display:flex;align-items:center;gap:.4cqw;z-index:4}
.pedit:hover{background:var(--teal-d)}

/* ===== شريط سفلي ===== */
.bottombar{
  position:fixed;left:0;right:0;bottom:0;z-index:42;display:flex;gap:9px;align-items:center;justify-content:center;
  padding:9px 12px calc(9px + var(--safe-b));background:rgba(255,255,255,.9);backdrop-filter:saturate(160%) blur(12px);
  border-top:1px solid var(--line);box-shadow:0 -3px 18px rgba(15,93,80,.07)
}
.bottombar .inner{display:flex;gap:9px;width:100%;max-width:560px}
.act{flex:1;height:46px;border-radius:13px;border:1px solid var(--line);background:#fff;color:var(--ink);
  font-size:14.5px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
.act:hover{background:var(--tint);border-color:var(--teal)}
.act:active{transform:translateY(1px)}
.act.primary{background:linear-gradient(160deg,var(--teal-l),var(--teal-d));border-color:transparent;color:#fff;
  box-shadow:0 10px 22px -10px rgba(15,93,80,.95)}
.act.primary:hover{filter:brightness(1.04)}

/* ===== أغطية ونوافذ سفلية ===== */
.ov{position:fixed;inset:0;z-index:100;background:rgba(18,28,25,.5);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;animation:fade .18s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.bs{
  width:100%;max-width:560px;max-height:90vh;background:var(--card);border-radius:22px 22px 0 0;
  box-shadow:0 -10px 50px rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden;
  animation:rise .26s cubic-bezier(.22,1,.36,1);padding-bottom:var(--safe-b)
}
@keyframes rise{from{transform:translateY(60px);opacity:.5}to{transform:none;opacity:1}}
.bs-grip{width:42px;height:5px;border-radius:5px;background:#d3dad7;margin:9px auto 2px}
.bs-head{display:flex;align-items:center;gap:10px;padding:8px 16px 12px;border-bottom:1px solid var(--line)}
.bs-title{flex:1;font-weight:900;font-size:16.5px;color:var(--teal-d);line-height:1.25}
.bs-title small{display:block;font-weight:600;font-size:12px;color:var(--mut);margin-top:2px}
.bs-x{border:none;background:#eef1f0;color:#566;border-radius:11px;width:38px;height:38px;font-size:17px;flex:none}
.bs-x:hover{background:#e3e8e6}
.bs-body{padding:14px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.bs-foot{display:flex;gap:9px;padding:12px 16px;border-top:1px solid var(--line);background:#fbfcfc}
.btn{height:48px;border-radius:13px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:800;font-size:15px;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.15s;padding:0 16px}
.btn:hover{background:var(--tint)}
.btn:active{transform:translateY(1px)}
.btn.full{flex:1}

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

/* ═════════ مفاتيح التخزين ═════════ */
const K_SET='rep2_settings', K_DRAFT='rep2_draft', K_ARCH='rep2_archive';

/* ═════════ القوائم القابلة للإدارة ═════════ */
const CATS=[
  {key:'names',label:'أسماء البرامج'},
  {key:'types',label:'أنواع البرامج'},
  {key:'entities',label:'الجهات المنفّذة'},
  {key:'targets',label:'المستهدفون'},
  {key:'implementers',label:'المنفّذون'},
  {key:'goals',label:'الأهداف'},
  {key:'impacts',label:'الآثار / النتائج'},
];

/* ═════════ خريطة الحقول فوق النموذج (نِسب مئوية) ═════════ */
const FIELDS=[
  {key:'name',    list:'names',    l:64,  t:24.8, w:26, h:4.0, ph:'اسم البرنامج',  fs:1.85, align:'center'},
  {key:'type',    list:'types',    l:62,  t:35.0, w:28, h:4.0, ph:'نوع البرنامج',  fs:1.85, align:'center'},
  {key:'entity',  list:'entities', l:9,   t:24.8, w:27, h:4.0, ph:'الجهة المنفّذة', fs:1.78, align:'center'},
  {key:'targets', list:'targets',  l:9,   t:35.0, w:29, h:4.0, ph:'المستهدفون',    fs:1.78, align:'center'},
  {key:'date',    type:'date',     l:38,  t:39.9, w:24,   h:2.4, ph:'/  /  ١٤٤هـ',   fs:1.95, align:'center'},
  {key:'goal0', group:'goals', l:48.6, t:48.47, w:39, h:2.6, ph:'هدف ١', fs:1.85, align:'right'},
  {key:'goal1', group:'goals', l:7.7,  t:48.47, w:39, h:2.6, ph:'هدف ٢', fs:1.85, align:'right'},
  {key:'goal2', group:'goals', l:48.6, t:51.23, w:39, h:2.6, ph:'هدف ٣', fs:1.85, align:'right'},
  {key:'goal3', group:'goals', l:7.7,  t:51.23, w:39, h:2.6, ph:'هدف ٤', fs:1.85, align:'right'},
  {key:'imp0', group:'impacts', l:48.6, t:62.35, w:39, h:2.6, ph:'نتيجة ١', fs:1.85, align:'right'},
  {key:'imp1', group:'impacts', l:7.7,  t:62.35, w:39, h:2.6, ph:'نتيجة ٢', fs:1.85, align:'right'},
  {key:'imp2', group:'impacts', l:48.6, t:65.13, w:39, h:2.6, ph:'نتيجة ٣', fs:1.85, align:'right'},
  {key:'imp3', group:'impacts', l:7.7,  t:65.13, w:39, h:2.6, ph:'نتيجة ٤', fs:1.85, align:'right'},
  {key:'impl', list:'implementers', l:10, t:75.25, w:80, h:5.4, ph:'منفّذ البرنامج', fs:2.0, align:'center', multi:true},
];
const PHOTOS=[
  {l:9.14,  t:83.4, w:20.0, h:10.6},
  {l:30.52, t:83.4, w:20.0, h:10.6},
  {l:52.22, t:83.4, w:20.0, h:10.6},
];
const GOAL_KEYS=['goal0','goal1','goal2','goal3'];
const IMP_KEYS=['imp0','imp1','imp2','imp3'];

/* ═════════ أدوات ═════════ */
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
const toAr=n=>String(n).replace(/[0-9]/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);
const fromAr=s=>String(s).replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d));
const clean=s=>String(s||'').replace(/\s+/g,' ').trim();
const esc=s=>s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2300);}

/* ═════════ الحالة ═════════ */
let SET={lists:{},links:{}};
let D=blankReport();
function blankReport(){
  const s={date:{d:'',m:'',y:''},photos:[null,null,null],goalsScale:1,impactsScale:1};
  FIELDS.forEach(f=>{ if(f.key!=='date') s[f.key]=''; });
  return s;
}
function ensureLists(){ CATS.forEach(c=>{ if(!Array.isArray(SET.lists[c.key])) SET.lists[c.key]=[]; }); if(!SET.links||typeof SET.links!=='object') SET.links={}; }

function loadSettings(){ try{const r=JSON.parse(localStorage.getItem(K_SET)); if(r){SET={lists:r.lists||{},links:r.links||{}};}}catch(e){} ensureLists(); }
function saveSettings(){ try{ localStorage.setItem(K_SET,JSON.stringify({lists:SET.lists,links:SET.links})); }catch(e){ toast('تعذّر حفظ الإعدادات'); } }

function loadDraft(){ try{const r=JSON.parse(localStorage.getItem(K_DRAFT)); if(r) D=Object.assign(blankReport(),r);}catch(e){} }
function saveDraft(){
  try{ localStorage.setItem(K_DRAFT,JSON.stringify(D)); }
  catch(e){
    try{ const lite=Object.assign({},D,{photos:[null,null,null]}); localStorage.setItem(K_DRAFT,JSON.stringify(lite)); }catch(e2){}
  }
}

function getArch(){ try{return JSON.parse(localStorage.getItem(K_ARCH)||'[]');}catch(e){return [];} }
function setArch(a){ try{localStorage.setItem(K_ARCH,JSON.stringify(a)); updateArchBadge(); return true;}catch(e){toast('الذاكرة ممتلئة — صدّر بعض التقارير أو احذف تقارير قديمة'); return false;} }
function updateArchBadge(){ const n=getArch().length,b=$('#arch-badge'); if(!b)return; if(n){b.style.display='grid';b.textContent=toAr(n);}else b.style.display='none'; }

function cloneData(obj){ return JSON.parse(JSON.stringify(obj||{})); }
function safeFileName(name){
  const n=clean(name)||'تقرير-برنامج';
  return n.replace(/[\\/:*?"<>|]+/g,'-').replace(/\s+/g,' ').trim().slice(0,80)||'تقرير-برنامج';
}
function reportFileBase(rep){ return safeFileName((rep&&rep.name)||'تقرير-برنامج'); }
function downloadBlob(blob,name){
  const a=el('a'); a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1200);
}
function stripTags(s){
  const d=document.createElement('div'); d.innerHTML=String(s||''); return clean(d.textContent||d.innerText||String(s||''));
}
function safePlain(s){ return clean(stripTags(s)); }
function safeScriptJson(obj){ return JSON.stringify(obj).replace(/</g,'\\u003C').replace(/>/g,'\\u003E').replace(/&/g,'\\u0026'); }
function payloadFromText(txt){
  const str=String(txt||'').trim();
  if(!str) throw 0;
  if(str[0]==='<'){
    const m=str.match(/<script[^>]+id=["']embedded-report-data["'][^>]*>([\s\S]*?)<\/script>/i);
    if(!m) throw 0;
    return JSON.parse(m[1].trim());
  }
  return JSON.parse(str);
}
function makeEditableHtml(payload,title){
  const clone=document.documentElement.cloneNode(true);
  clone.querySelectorAll('.ov,#embedded-report-data').forEach(n=>n.remove());
  clone.querySelectorAll('.fld,.pslot,.date-mask').forEach(n=>n.remove());
  clone.querySelectorAll('input[type="file"]').forEach(n=>n.remove());
  const t=clone.querySelector('title'); if(t) t.textContent=title||'تقرير برامج قابل للتعديل';
  const meta=clone.querySelector('meta[name="theme-color"]'); if(meta) meta.setAttribute('content','#0f5d50');
  const embed='\n<script id="embedded-report-data" type="application/json">'+safeScriptJson(payload)+'<\/script>\n';
  return '<!DOCTYPE html>\n'+clone.outerHTML.replace('</body>',embed+'</body>');
}
function exportReportFile(rep=D){
  const data=cloneData(rep); delete data.__archiveId;
  const payload={app:'report-programs-editable',v:4,kind:'single',exportedAt:new Date().toISOString(),name:safePlain(data.name)||'تقرير بدون اسم',data};
  const title=payload.name+' - ملف قابل للتعديل';
  downloadBlob(new Blob([makeEditableHtml(payload,title)],{type:'text/html;charset=utf-8'}), reportFileBase(data)+'.html');
  toast('صُدّر ملف HTML قابل للتعديل مع الصور ✓');
}
function importReportFile(file,done){
  const fr=new FileReader();
  fr.onload=()=>{
    try{
      const obj=payloadFromText(fr.result);
      let data=null;
      if(obj&&obj.data) data=obj.data;
      else if(obj&&obj.reports&&obj.reports[0]) data=obj.reports[0].data;
      if(!data) throw 0;
      D=Object.assign(blankReport(),cloneData(data));
      D.__archiveId=null;
      saveDraft(); renderFields(); renderPhotos();
      if(done) done();
      toast('تم استيراد التقرير ويمكن تعديله الآن ✓');
    }catch(e){ toast('ملف التقرير غير صالح'); }
  };
  fr.readAsText(file);
}
function exportArchiveRecords(records){
  if(!records.length){ toast('حدد تقريرًا واحدًا على الأقل'); return; }
  const cleanRecords=records.map(r=>({
    id:r.id,
    name:safePlain(r.name||(r.data&&r.data.name))||'تقرير بدون اسم',
    date:datePlainOf(r.data)||safePlain(r.date)||'بدون تاريخ',
    ts:r.ts||Date.now(),
    data:cloneData(r.data||{})
  }));
  const payload={app:'report-programs-archive',v:4,kind:'archive',exportedAt:new Date().toISOString(),reports:cleanRecords};
  const label=cleanRecords.length===1?reportFileBase(cleanRecords[0].data):'تقارير-البرامج-المحددة';
  downloadBlob(new Blob([makeEditableHtml(payload,safeFileName(label))],{type:'text/html;charset=utf-8'}), safeFileName(label)+'.html');
  toast('صُدّر ملف HTML قابل للتعديل مع الصور ✓');
}
function importArchiveFile(file,done){
  const fr=new FileReader();
  fr.onload=()=>{
    try{
      const obj=payloadFromText(fr.result);
      const incoming=obj&&obj.reports?obj.reports:(obj&&obj.data?[{name:obj.name||obj.data.name,date:'',ts:Date.now(),data:obj.data}]:null);
      if(!Array.isArray(incoming)||!incoming.length) throw 0;
      const now=Date.now();
      const add=incoming.map((r,i)=>{
        const data=Object.assign(blankReport(),cloneData(r.data||{}));
        return {id:now+i,name:safePlain(r.name||data.name)||'تقرير بدون اسم',date:datePlainOf(data)||safePlain(r.date)||'',ts:r.ts||now,data};
      });
      const ok=setArch(add.concat(getArch()).slice(0,80));
      if(ok){ if(done) done(); toast('استُوردت التقارير إلى الأرشيف ✓'); }
    }catch(e){ toast('ملف الأرشيف غير صالح'); }
  };
  fr.readAsText(file);
}
function applyEmbeddedPayload(){
  const node=document.getElementById('embedded-report-data');
  if(!node) return;
  try{
    const obj=JSON.parse(node.textContent||'{}');
    if(obj&&obj.reports&&Array.isArray(obj.reports)&&obj.reports.length){
      const records=obj.reports.map((r,i)=>{
        const data=Object.assign(blankReport(),cloneData(r.data||{}));
        return {id:r.id||Date.now()+i,name:safePlain(r.name||data.name)||'تقرير بدون اسم',date:datePlainOf(data)||safePlain(r.date)||'',ts:r.ts||Date.now(),data};
      });
      localStorage.setItem(K_ARCH,JSON.stringify(records.slice(0,80)));
      D=Object.assign(blankReport(),cloneData(records[0].data));
      D.__archiveId=records[0].id;
      saveDraft();
    }else if(obj&&obj.data){
      D=Object.assign(blankReport(),cloneData(obj.data));
      D.__archiveId=null;
      saveDraft();
    }
  }catch(e){}
}


/* ═════════ التاريخ الهجري ═════════ */
const HMONTHS=['محرّم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوّال','ذو القعدة','ذو الحجة'];
function gToH(date){
  const p=new Intl.DateTimeFormat('en-US-u-ca-islamic-umalqura',{day:'numeric',month:'numeric',year:'numeric'}).formatToParts(date);
  const g=t=>+p.find(x=>x.type===t).value; return {d:g('day'),m:g('month'),y:g('year')};
}
function todayHijri(){ try{return gToH(new Date());}catch(e){return {d:'',m:'',y:1447};} }
const DAY=86400000, ANCHOR=Date.UTC(2024,6,7); // ١ محرّم ١٤٤٦هـ ≈ 2024-07-07
function hijriMonthDays(y,m){
  const guess=ANCHOR+Math.round((y-1446)*354.36707+(m-1)*29.530589+14)*DAY;
  const days=[];
  for(let off=-20;off<=20;off++){
    const d=new Date(guess+off*DAY); const h=gToH(d);
    if(h.y===y&&h.m===m) days.push({hd:h.d,wd:d.getUTCDay()});
  }
  days.sort((a,b)=>a.hd-b.hd); return days;
}

/* ═════════ بناء الورقة ═════════ */
function buildSheet(){
  const sheet=$('#sheet');
  sheet.querySelectorAll('.fld,.pslot').forEach(n=>n.remove());
  // قناع أبيض يخفي التاريخ المطبوع القديم على النموذج (يُنشأ مرة واحدة، أسفل حقل التاريخ)
  if(!sheet.querySelector('.date-mask')){ sheet.appendChild(el('div','date-mask')); }
  FIELDS.forEach(f=>{
    const d=el('div','fld '+(f.align==='right'?'right':'center')+(f.type==='date'?' date':''));
    d.style.cssText=`left:${f.l}%;top:${f.t}%;width:${f.w}%;height:${f.h}%`;
    d.dataset.key=f.key; d.dataset.ph=f.ph;
    d.addEventListener('click',()=> f.type==='date'?openDate():openFieldEditor(f));
    sheet.appendChild(d);
  });
  PHOTOS.forEach((p,i)=>{
    const s=el('div','pslot'); s.dataset.slot=i;
    s.style.cssText=`left:${p.l}%;top:${p.t}%;width:${p.w}%;height:${p.h}%`;
    sheet.appendChild(s);
  });
  renderFields(); renderPhotos();
}

function fitText(d,baseFs){
  // يبدأ من الحجم الأساسي ثم يصغّر تلقائياً حتى يتّسع النص داخل الخانة
  let fs=baseFs;
  d.style.fontSize=fs+'cqw';
  let guard=0;
  while((d.scrollHeight>d.clientHeight+1||d.scrollWidth>d.clientWidth+1)&&fs>1.05&&guard<40){
    fs-=0.06; d.style.fontSize=fs.toFixed(2)+'cqw'; guard++;
  }
}
function fldBase(f){
  let fs=f.fs;
  if(f.group==='goals') fs=f.fs*(D.goalsScale||1);
  if(f.group==='impacts') fs=f.fs*(D.impactsScale||1);
  return fs;
}
function renderFields(){
  FIELDS.forEach(f=>{
    const d=$(`.fld[data-key="${f.key}"]`); if(!d) return;
    if(f.type==='date'){
      const s=dateStr();
      if(s){ d.innerHTML=s; d.classList.remove('empty'); d.style.fontSize=f.fs+'cqw'; }
      else{ d.textContent=''; d.classList.add('empty'); d.style.fontSize=''; }
      return;
    }
    if(f.multi){
      const names=(D[f.key]||'').split('\n').map(s=>s.trim()).filter(Boolean);
      d.classList.toggle('multi',names.length>1);
      if(names.length>1) d.innerHTML=names.map(n=>`<span class="impl-name">${esc(n)}</span>`).join('');
      else d.textContent=names[0]||'';
      d.classList.toggle('empty',names.length===0);
      if(names.length){ fitText(d,fldBase(f)); } else { d.style.fontSize=''; }
      return;
    }
    const v=D[f.key]||'';
    d.textContent=v; d.classList.toggle('empty',!clean(v));
    if(clean(v)) fitText(d,fldBase(f)); else d.style.fontSize='';
  });
}
function dateStrOf(rep){
  const {d,m,y}=(rep&&rep.date)||{}; if(!d&&!m&&!y) return '';
  const seg=v=>`<span class="dseg">${v}</span>`;
  return `${seg(d?toAr(d):'..')} / ${seg(m?toAr(m):'..')} / ${seg(y?toAr(y):'....')}${seg('هـ')}`;
}
function dateStr(){ return dateStrOf(D); }
function datePlainOf(rep){
  const {d,m,y}=(rep&&rep.date)||{}; if(!d&&!m&&!y) return '';
  return `${d?toAr(d):'..'} / ${m?toAr(m):'..'} / ${y?toAr(y):'....'}هـ`;
}
function datePlain(){ return datePlainOf(D); }
function archiveTitle(rec){ return safePlain((rec&&rec.name)||((rec&&rec.data)&&rec.data.name))||'تقرير بدون اسم'; }
function archiveDateLabel(rec){ return datePlainOf(rec&&rec.data)||safePlain(rec&&rec.date)||'بدون تاريخ'; }

/* ═════════ الصور ═════════ */
function photoStyle(img,ph){
  const mode=(ph&&ph.fit)||'contain';
  const fit=mode==='stretch'?'fill':mode;
  const ox=(ph&&ph.ox)!=null?ph.ox:50;
  const oy=(ph&&ph.oy)!=null?ph.oy:50;
  const zoom=(ph&&ph.zoom)?ph.zoom:1;
  img.style.width='100%'; img.style.height='100%'; img.style.objectFit=fit;
  img.style.objectPosition=`${ox}% ${oy}%`;
  img.style.transform=`scale(${zoom})`;
  img.style.transformOrigin=`${ox}% ${oy}%`;
  img.style.background='#fff';
}
function renderPhotos(){
  PHOTOS.forEach((p,i)=>{
    const s=$(`.pslot[data-slot="${i}"]`); if(!s) return;
    s.innerHTML=''; s.onclick=null;
    const ph=D.photos[i];
    if(ph&&ph.src){
      const img=el('img'); img.src=ph.src; photoStyle(img,ph); s.appendChild(img);
      const e=el('button','pedit'); e.innerHTML='✎ تعديل';
      e.onclick=ev=>{ ev.stopPropagation(); openPhotoEditor(i); };
      s.appendChild(e);
      s.onclick=()=>openPhotoEditor(i);
    }else{
      const a=el('div','padd');
      a.innerHTML='<span class="cam">📷</span><span>إضافة صورة</span><span class="sub">يُفضّل الوضع العرضي</span>';
      s.appendChild(a);
      s.onclick=()=>openPhotoSource(i);
    }
  });

function ensureInputs(){

async function onPick(e){
  const file=e.target.files&&e.target.files[0]; if(!file) return;
  toast('جاري معالجة الصورة…');
  try{
    const src=await resizeImage(file);
    if(pickMode==='replace'&&D.photos[curSlot]) D.photos[curSlot].src=src;
    else D.photos[curSlot]={src,ox:50,oy:50,zoom:1,fit:'contain'};
    saveDraft(); renderPhotos(); openPhotoEditor(curSlot);
  }catch(err){ toast('تعذّر تحميل الصورة'); }
}
async function resizeImage(file,maxDim=1280,quality=0.85){
  let bmp;
  try{ bmp=await createImageBitmap(file,{imageOrientation:'from-image'}); }
  catch(e){ bmp=await new Promise((res,rej)=>{const im=new Image();const u=URL.createObjectURL(file);im.onload=()=>{URL.revokeObjectURL(u);res(im);};im.onerror=()=>{URL.revokeObjectURL(u);rej(0);};im.src=u;}); }
  let w=bmp.width,h=bmp.height; const sc=Math.min(1,maxDim/Math.max(w,h));
  w=Math.max(1,Math.round(w*sc)); h=Math.max(1,Math.round(h*sc));
  const c=el('canvas'); c.width=w; c.height=h; const x=c.getContext('2d');
  x.fillStyle='#fff'; x.fillRect(0,0,w,h); x.drawImage(bmp,0,0,w,h);
  if(bmp.close) bmp.close();
  return c.toDataURL('image/jpeg',quality);
}

function openPhotoEditor(i){

/* ═════════ غطاء عام (نافذة سفلية) ═════════ */
function mkOverlay(id){
  const ov=el('div','ov'); ov.id='ov-'+id;
  const bs=el('div','bs'); ov.appendChild(bs);
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  document.body.appendChild(ov);
  function close(){ ov.remove(); }
  return {ov,bs,close};
}

/* ═════════ محرّر المجموعة (الأهداف/الآثار) ═════════ */
function openGroupEditor(kind, focusKey){
  const isG=kind==='goals';
  const keys=isG?GOAL_KEYS:IMP_KEYS;
  const listKey=isG?'goals':'impacts';
  const title=isG?'الأهداف (حتى ٤)':'الآثار / النتائج (حتى ٤)';
  const noun=isG?'الهدف':'النتيجة';
  const AR=['١','٢','٣','٤'];
  const scaleKey=isG?'goalsScale':'impactsScale';
  const ov=mkOverlay('grp');
  ov.bs.innerHTML=`
    <div class="bs-grip"></div>
    <div class="bs-head"><span class="bs-title">${title}<small>اختر طريقة الإدخال</small></span><button class="bs-x">✕</button></div>
    <div class="bs-body">
      <div class="seg" id="g-mode">
        <button data-m="ind" class="on">📝 فردي</button>
        <button data-m="grp">📋 جماعي</button>
      </div>
      <div class="hint" id="g-hint"></div>
      <div id="g-ind" style="display:flex;flex-direction:column;gap:9px;margin-bottom:4px">
        ${keys.map((k,i)=>`<input class="ti g-in" data-i="${i}" placeholder="${noun} ${AR[i]} (اختياري)">`).join('')}
      </div>
      <div id="g-grp" style="display:none">
        <textarea class="ta" id="g-ta" rows="4" placeholder="اكتب أو الصق عبارة في كل سطر (حتى ٤)…"></textarea>
      </div>
      <div class="fontctl">
        <span class="lbl">حجم الخط في النموذج</span>
        <div class="grp"><button id="g-minus">−</button><span class="val" id="g-val"></span><button id="g-plus">＋</button></div>
      </div>
      <div class="sub-lab">أو اضغط عبارة جاهزة لإضافتها:</div>
      <div class="opts" id="g-list"></div>
    </div>
    <div class="bs-foot"><button class="btn ghost full" id="g-clr">مسح الكل</button><button class="btn ok full" id="g-ok">حفظ</button></div>`;
  const ins=[...ov.bs.querySelectorAll('.g-in')], ta=$('#g-ta',ov.bs), list=$('#g-list',ov.bs), valEl=$('#g-val',ov.bs);
  const indV=$('#g-ind',ov.bs), grpV=$('#g-grp',ov.bs), hint=$('#g-hint',ov.bs);
  ins.forEach((inp,i)=>inp.value=D[keys[i]]||'');
  let scale=D[scaleKey]||1, mode='ind';
  const showVal=()=>valEl.textContent=Math.round(scale*100)+'%';
  showVal();
  const HINTS={
    ind:'<b>فردي:</b> صندوق مستقل لكل عبارة — املأ واحداً أو أكثر، لا حاجة لتعبئتها كلها.',
    grp:'<b>جماعي:</b> اكتب أو الصق كل العبارات معاً في صندوق واحد، عبارة في كل سطر (حتى ٤).'
  };
  const lines=()=>ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
  function setMode(m){
    if(m==='grp') ta.value=ins.map(x=>clean(x.value)).filter(Boolean).join('\n');
    else { const ls=lines().slice(0,4); ins.forEach((x,i)=>x.value=ls[i]||''); }
    mode=m;
    indV.style.display = m==='ind'?'flex':'none';
    grpV.style.display = m==='grp'?'block':'none';
    hint.innerHTML=HINTS[m];
    [...ov.bs.querySelectorAll('#g-mode button')].forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  }
  [...ov.bs.querySelectorAll('#g-mode button')].forEach(b=>b.onclick=()=>setMode(b.dataset.m));
  function build(){
    const arr=SET.lists[listKey]||[];
    list.innerHTML='';
    if(!arr.length){ list.innerHTML='<div class="empty-note">لا توجد عبارات جاهزة — اكتبها بالأعلى أو أضِفها من ⚙️ الإعدادات.</div>'; return; }
    arr.forEach(o=>{ const b=el('button','opt'); b.textContent=o;
      b.onclick=()=>{
        if(mode==='grp'){
          const ls=lines(); if(ls.length>=4){toast('الحد الأقصى ٤ عبارات');return;} if(ls.includes(o))return;
          ls.push(o); ta.value=ls.join('\n'); ta.focus();
        }else{
          if(ins.some(x=>clean(x.value)===o)) return;
          const empty=ins.find(x=>!clean(x.value));
          if(!empty){ toast('الصناديق ممتلئة — امسح صندوقاً أولاً'); return; }
          empty.value=o; empty.focus();
        }
      };
      list.appendChild(b); });
  }
  $('#g-minus',ov.bs).onclick=()=>{ scale=Math.max(0.6,+(scale-0.06).toFixed(2)); showVal(); };
  $('#g-plus',ov.bs).onclick=()=>{ scale=Math.min(1.4,+(scale+0.06).toFixed(2)); showVal(); };
  $('#g-ok',ov.bs).onclick=()=>{
    const vals = mode==='grp' ? lines().slice(0,4) : ins.map(x=>clean(x.value));
    keys.forEach((k,i)=>D[k]=vals[i]||''); D[scaleKey]=scale; saveDraft(); renderFields(); ov.close();
  };
  $('#g-clr',ov.bs).onclick=()=>{ keys.forEach(k=>D[k]=''); D[scaleKey]=scale; saveDraft(); renderFields(); ov.close(); };
  ov.bs.querySelector('.bs-x').onclick=ov.close;
  setMode('ind');
  build();
  // ركّز الصندوق المطابق للخانة التي ضُغطت في النموذج
  const fi=keys.indexOf(focusKey);
  if(fi>=0 && ins[fi]) setTimeout(()=>{ ins[fi].focus(); ins[fi].select(); },60);
}

/* ═════════ محرّر المنفّذين (اختيار متعدّد) ═════════ */
function openMultiEditor(f){
  let sel=(D[f.key]||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const ov=mkOverlay('multi');
  ov.bs.innerHTML=`
    <div class="bs-grip"></div>

    sel.forEach((n,i)=>{ const c=el('span','chip'); c.innerHTML=`${esc(n)} <b>✕</b>`; c.querySelector('b').onclick=()=>{sel.splice(i,1);rc();build();}; chips.appendChild(c); });
  }
  function build(){
    const arr=SET.lists[f.list]||[]; const q=clean(inp.value);
    const fl=q?arr.filter(x=>x.includes(q)):arr;
    list.innerHTML='';
    if(!arr.length){ list.innerHTML='<div class="empty-note">لا توجد أسماء بعد — اكتب الاسم وأضِفه، أو من ⚙️ الإعدادات.</div>'; return; }

/* ═════════ التقويم الهجري ═════════ */
function openDate(){
  let cur=(D.date&&D.date.y)?{y:+fromAr(D.date.y),m:+fromAr(D.date.m)||todayHijri().m}:{y:todayHijri().y,m:todayHijri().m};
  if(!cur.m) cur.m=todayHijri().m;
  const ov=mkOverlay('date');
  ov.bs.innerHTML=`
    <div class="bs-grip"></div>
    <div class="bs-head"><span class="bs-title">تاريخ التنفيذ (هجري)<small>اضغط على اليوم</small></span><button class="bs-x">✕</button></div>
    <div class="bs-body" id="cal-wrap"></div>
    <div class="bs-foot"><button class="btn ghost full" id="cal-clr">مسح</button><button class="btn full" id="cal-today">⊙ اليوم</button></div>`;
  const wrap=$('#cal-wrap',ov.bs);
  function render(){
    const days=hijriMonthDays(cur.y,cur.m);
    const first=days.length?days[0].wd:0;
    const t=todayHijri(), sel=D.date||{};
    let g='<div class="cal-grid">';
    ['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'].forEach(w=>g+=`<div class="cal-wd">${w}</div>`);
    for(let i=0;i<first;i++) g+='<div class="cal-day empty"></div>';
    days.forEach(dd=>{
      const isT=(+t.d===dd.hd&&+t.m===cur.m&&+t.y===cur.y);
      const isS=(+fromAr(sel.d)===dd.hd&&+fromAr(sel.m)===cur.m&&+fromAr(sel.y)===cur.y);
      g+=`<button class="cal-day${isT?' today':''}${isS?' sel':''}" data-d="${dd.hd}">${toAr(dd.hd)}</button>`;
    });
    g+='</div>';
    wrap.innerHTML=`
      <div class="cal-head">
        <button class="cal-nav" id="cn-prev">‹</button>
        <div class="cal-title">
          <div class="cal-month">${HMONTHS[cur.m-1]}</div>
          <div class="cal-year"><button class="yb" id="cy-dn">−</button><span>${toAr(cur.y)}هـ</span><button class="yb" id="cy-up">＋</button></div>
        </div>
        <button class="cal-nav" id="cn-next">›</button>
      </div>${g}`;
    $('#cn-prev',wrap).onclick=()=>{ cur.m--; if(cur.m<1){cur.m=12;cur.y--;} render(); };
    $('#cn-next',wrap).onclick=()=>{ cur.m++; if(cur.m>12){cur.m=1;cur.y++;} render(); };
    $('#cy-dn',wrap).onclick=()=>{ cur.y--; render(); };
    $('#cy-up',wrap).onclick=()=>{ cur.y++; render(); };
    wrap.querySelectorAll('.cal-day[data-d]').forEach(b=>b.onclick=()=>{
      D.date={d:+b.dataset.d,m:cur.m,y:cur.y}; saveDraft(); renderFields(); ov.close();
    });
  }
  $('#cal-today',ov.bs).onclick=()=>{ const t=todayHijri(); D.date={d:t.d,m:t.m,y:t.y}; saveDraft(); renderFields(); ov.close(); };

/* ═════════ تصدير/طباعة التقارير المحفوظة ═════════ */
function renderReportToSheet(sheet,rep){
  sheet.innerHTML='';
  sheet.appendChild(el('div','date-mask'));
  FIELDS.forEach(f=>{
    const d=el('div','fld '+(f.align==='right'?'right':'center')+(f.type==='date'?' date':''));
    d.style.cssText=`left:${f.l}%;top:${f.t}%;width:${f.w}%;height:${f.h}%`;
    d.dataset.key=f.key; d.dataset.ph=f.ph;
    if(f.type==='date'){
      const s=dateStrOf(rep);
      if(s){ d.innerHTML=s; d.classList.remove('empty'); d.style.fontSize=f.fs+'cqw'; }
      else d.classList.add('empty');
    }else if(f.multi){
      const names=(rep[f.key]||'').split('\n').map(s=>s.trim()).filter(Boolean);
      d.classList.toggle('multi',names.length>1);
      if(names.length>1) d.innerHTML=names.map(n=>`<span class="impl-name">${esc(n)}</span>`).join('');
      else d.textContent=names[0]||'';
      d.classList.toggle('empty',names.length===0);
      if(names.length) setTimeout(()=>fitText(d,f.fs),0);
    }else{
      const v=rep[f.key]||'';
      d.textContent=v; d.classList.toggle('empty',!clean(v));
      if(clean(v)) setTimeout(()=>fitText(d, f.group==='goals'?f.fs*(rep.goalsScale||1):f.group==='impacts'?f.fs*(rep.impactsScale||1):f.fs),0);
    }
    sheet.appendChild(d);
  });
  PHOTOS.forEach((p,i)=>{
    const s=el('div','pslot'); s.dataset.slot=i;
    s.style.cssText=`left:${p.l}%;top:${p.t}%;width:${p.w}%;height:${p.h}%`;
    const ph=rep.photos&&rep.photos[i];
    if(ph&&ph.src){ const img=el('img'); img.src=ph.src; photoStyle(img,ph); s.appendChild(img); }
    sheet.appendChild(s);
  });
}
function waitImages(root){
  const imgs=[...root.querySelectorAll('img')];
  return Promise.all(imgs.map(img=> img.complete?Promise.resolve():new Promise(res=>{img.onload=img.onerror=res;})));
}
async function printReports(records,title){
  if(!records.length){ toast('حدد تقريرًا واحدًا على الأقل'); return; }
  const oldTitle=document.title;
  const oldPack=$('#print-pack'); if(oldPack) oldPack.remove();
  const pack=el('div','print-pack'); pack.id='print-pack';
  records.forEach(rec=>{
    const wrap=el('div','print-sheet-wrap');
    const sh=el('div','sheet');
    renderReportToSheet(sh,Object.assign(blankReport(),cloneData(rec.data||{})));
    wrap.appendChild(sh); pack.appendChild(wrap);
  });
  document.body.appendChild(pack);
  document.title=safeFileName(title||records[0].name||'تقارير-البرامج');
  document.body.classList.add('print-pack-mode');
  await waitImages(pack);
  const cleanup=()=>{ document.body.classList.remove('print-pack-mode'); pack.remove(); document.title=oldTitle; window.removeEventListener('afterprint',cleanup); };
  window.addEventListener('afterprint',cleanup);
  setTimeout(()=>{ window.print(); setTimeout(cleanup,1200); },120);
}
function printCurrentReport(){
  const rec={name:clean(D.name)||'تقرير بدون اسم',data:cloneData(D)};
  printReports([rec],reportFileBase(D));
}

function saveToArchive(){

  const rec=cloneData(D); // تحفظ الصور الآن مع التقرير
  const a=getArch();
  const existingId=rec.__archiveId;
  delete rec.__archiveId;
  const item={id:existingId||Date.now(),name,date:datePlain(),ts:Date.now(),data:rec};
  let next;
  if(existingId&&a.some(x=>x.id===existingId)) next=a.map(x=>x.id===existingId?item:x);
  else next=[item].concat(a);
  const ok=setArch(next.slice(0,80));
  if(ok){ D.__archiveId=item.id; saveDraft(); toast(existingId?'تم تحديث التقرير المحفوظ بالصور ✓':'حُفظ في الأرشيف بالصور ✓'); }
}

/* ═════════ الإعدادات (إدارة القوائم + الربط + النسخ الاحتياطي) ═════════ */
function openSettings(){

      <div class="seg" id="s-seg">

  function renderLinks(){

  $('#s-tabs',ov.bs); ov.bs.querySelector('.bs-x').onclick=ov.close;

function exportSettings(){
  const payload={app:'report-overlay',v:2,exportedAt:new Date().toISOString(),lists:SET.lists,links:SET.links};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=el('a'); a.href=URL.createObjectURL(blob); a.download='اعدادات-تقرير-البرامج.json';
  document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1200);
  toast('صُدّرت الإعدادات ✓');
}
function importSettings(file,ov){
  const fr=new FileReader();
  fr.onload=()=>{
    try{
      const obj=JSON.parse(fr.result);
      if(!obj||!obj.lists) throw 0;
      if(!confirm('استبدال إعداداتك الحالية بالإعدادات المستوردة؟')) return;
      SET.lists=obj.lists||{}; SET.links=obj.links||{}; ensureLists(); saveSettings();
      toast('استُوردت الإعدادات ✓'); if(ov) ov.close();
    }catch(e){ toast('الملف غير صالح'); }
  };
  fr.readAsText(file);
}

      const b=document.getElementById(id);
      if(b){ b.setAttribute('aria-label',labels[id]); b.setAttribute('type','button'); }
    });
    const toast=document.getElementById('toast');
    if(toast){ toast.setAttribute('role','status'); toast.setAttribute('aria-live','polite'); }
    const sheet=document.getElementById('sheet');
    function patchInteractive(){
      document.querySelectorAll('.fld').forEach(f=>{
        if(!f.hasAttribute('tabindex')) f.setAttribute('tabindex','0');
        f.setAttribute('role','button');
        f.setAttribute('aria-label','تعديل خانة '+(f.dataset.ph||f.dataset.key||''));
        if(!f.dataset.kbReady){
          f.dataset.kbReady='1';
          f.addEventListener('keydown',ev=>{
            if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); f.click(); }
          });
        }
      });
      document.querySelectorAll('.pslot').forEach((p,i)=>{
        if(!p.hasAttribute('tabindex')) p.setAttribute('tabindex','0');
        p.setAttribute('role','button');
        p.setAttribute('aria-label','إضافة أو تعديل صورة الشاهد رقم '+String(i+1));
        if(!p.dataset.kbReady){
          p.dataset.kbReady='1';
          p.addEventListener('keydown',ev=>{
            if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); p.click(); }
          });
        }
      });
    }
    patchInteractive();
    if(sheet && 'MutationObserver' in window){
      new MutationObserver(()=>patchInteractive()).observe(sheet,{childList:true,subtree:true});
    }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',enhance);
  else enhance();
})();
</script>

</body>
</html>
